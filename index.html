<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treact</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/14307446ae.js" crossorigin="anonymous"></script>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
</style>
</head>
<body>
    <nav>
        <div class="row nav__row">
            <div class="nav__logo">
                    <img class="nav__logo--img" src="./assets/logo.2c489fc453a1783cbadacf914efa3df6.svg">
                <div class="nav__logo--title">Treact</div>
            </div>
                <div class="nav__links">
                    <a href="#" class="nav__link">About</a>
                    <a href="#" class="nav__link">Blog</a>
                    <a href="#" class="nav__link">Pricing</a>
                    <a href="#" class="nav__link">Contact Us</a>
                    <a href="#" class="nav__link nav__link--login">Login</a>
                    <a href="#" class="nav__link nav__link--primary">Sign up</a>
                </div>
        </div>
    </nav>

    <header>
        <div class="container">
            <div class="row">
                <div class="landing">
                        <div class="header__description">
                            
                                <h1 class="landing__header">Beautiful React Templates <span class="purple">for you.</span></h1>
                                <p class="landing__description">Our templates are easy to setup, understand and customize. Fully modular components with a variety of pages and components</p>
                                <div class="header__contact">
                                    <input class="header__email" type="email" placeholder="Your E-mail Address">
                                    <button class="header__button">Get Started</button>
                                </div>
                                <h3 class="customers__sub-heading">OUR TRUSTED CUSTOMERS</h3>
                                <img class="logo-strip" src="./assets/customers-logo-strip.680ac7c2e8ae28161d2c.png">
                        </div>
                    <div class="header__img--wrapper">
                        <img class="header__img" src="./assets/undraw_stars_5pgw.svg">
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section id="features"></section>
        <section id="quality"></section>
        <section id="steps"></section>
        <section id="values"></section>
        <section id="pricing"></section>
        <section id="testimonials"></section>
        <section id="start"></section>
    </main>
</body>
</html>
